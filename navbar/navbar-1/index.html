
<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-black">
  <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50" style="--accent:#d8a15c">
  <style>
    .navbar{display:flex;align-items:center;gap:6px;height:48px;padding:6px;border-radius:9999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 30px rgba(0,0,0,.35);max-width:min(92vw,640px)}
    .links-track{display:grid;grid-template-columns:1fr;transition:grid-template-columns .45s cubic-bezier(.65,0,.35,1);overflow:hidden}
    .navbar.collapsed .links-track{grid-template-columns:0fr}
    .links-inner{min-width:0;overflow:hidden;display:flex;align-items:center;gap:22px;padding-left:14px;padding-right:6px;white-space:nowrap}
    .nav-link{font-family:Georgia,'Times New Roman',serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.78);text-decoration:none;position:relative;padding:4px 2px;opacity:1;transition:opacity .3s ease .1s,color .2s ease}
    .navbar.collapsed .nav-link{opacity:0;transition:none}
    .nav-link::after{content:'';position:absolute;left:0;right:100%;bottom:-2px;height:1px;background:var(--accent);transition:right .25s ease}
    .nav-link:hover{color:#fff}
    .nav-link:hover::after{right:0}
    .nav-link:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
    .search-chip{position:relative;height:36px;display:flex;align-items:center;border-radius:9999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);padding:0 14px;cursor:pointer;flex:0 0 auto;width:150px;justify-content:space-between;gap:10px;transition:background .25s ease,width .45s cubic-bezier(.65,0,.35,1)}
    .navbar.collapsed .search-chip{width:120px;background:transparent;border-color:transparent}
    .search-chip:hover{background:rgba(255,255,255,.12)}
    .search-chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .chip-label{position:relative;height:14px;flex:1;overflow:hidden}
    .chip-label span{position:absolute;inset:0;font-size:10.5px;letter-spacing:.14em;white-space:nowrap;font-family:Georgia,serif;transition:opacity .25s ease,transform .25s ease}
    .chip-label .hint{opacity:1;transform:translateY(0);color:rgba(255,255,255,.7)}
    .chip-label .brand{opacity:0;transform:translateY(4px);color:#fff;letter-spacing:.2em}
    .navbar.collapsed .chip-label .hint{opacity:0;transform:translateY(-4px)}
    .navbar.collapsed .chip-label .brand{opacity:1;transform:translateY(0)}
    .search-icon{width:14px;height:14px;color:rgba(255,255,255,.7);flex:0 0 auto}
    .search-overlay{position:absolute;inset:0;display:flex;align-items:center;background:rgba(10,10,12,.96);border-radius:9999px;padding:0 14px;opacity:0;pointer-events:none;transition:opacity .2s ease}
    .search-chip.active .search-overlay{opacity:1;pointer-events:auto}
    .search-overlay input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:12px;letter-spacing:.05em;font-family:ui-sans-serif,system-ui}
    .search-overlay input::placeholder{color:rgba(255,255,255,.4)}
    .esc-hint{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.1em}
    @media (prefers-reduced-motion:reduce){.navbar,.links-track,.nav-link,.search-chip,.chip-label span,.search-overlay{transition:none!important}}
    @media (max-width:480px){.links-inner{gap:14px;padding-left:10px}.nav-link{font-size:10px}}
  </style>

  <nav id="navbar" class="navbar expanded" aria-label="Primary">
    <div class="links-track">
      <div class="links-inner">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Blogs</a>
        <a href="#" class="nav-link">About</a>
        <a href="#" class="nav-link">Contact</a>
      </div>
    </div>
    <div id="searchChip" class="search-chip" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false" aria-label="Open search, or press Control K">
      <div class="chip-label">
        <span class="hint">CTRL + K</span>
        <span class="brand">URBANARCH</span>
      </div>
      <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
      <div class="search-overlay">
        <input id="searchInput" type="text" placeholder="Search the site…" autocomplete="off" />
        <span class="esc-hint">ESC</span>
      </div>
    </div>
  </nav>
</div>

<script>
(function(){
  const navbar = document.getElementById('navbar');
  const chip = document.getElementById('searchChip');
  const input = document.getElementById('searchInput');
  const COLLAPSE_DELAY = 2200;
  let collapseTimer;
  let searchActive = false;

  function collapse(){ if(searchActive) return; navbar.classList.add('collapsed'); navbar.classList.remove('expanded'); }
  function expand(){ navbar.classList.remove('collapsed'); navbar.classList.add('expanded'); }
  function scheduleCollapse(){ clearTimeout(collapseTimer); collapseTimer = setTimeout(collapse, COLLAPSE_DELAY); }

  function openSearch(){
    searchActive = true;
    expand();
    clearTimeout(collapseTimer);
    chip.classList.add('active');
    chip.setAttribute('aria-expanded','true');
    requestAnimationFrame(() => input.focus());
  }
  function closeSearch(revert){
    searchActive = false;
    chip.classList.remove('active');
    chip.setAttribute('aria-expanded','false');
    input.value = '';
    if(revert) scheduleCollapse();
  }

  scheduleCollapse();

  navbar.addEventListener('mouseenter', () => { clearTimeout(collapseTimer); expand(); });
  navbar.addEventListener('mouseleave', () => { if(!searchActive) scheduleCollapse(); });

  navbar.addEventListener('focusin', () => { clearTimeout(collapseTimer); expand(); });
  navbar.addEventListener('focusout', (e) => {
    if(!navbar.contains(e.relatedTarget) && !searchActive) scheduleCollapse();
  });

  chip.addEventListener('click', openSearch);
  chip.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openSearch(); }
  });

  document.addEventListener('keydown', (e) => {
    if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k'){
      e.preventDefault();
      openSearch();
    } else if(e.key === 'Escape' && searchActive){
      closeSearch(true);
      chip.focus();
    }
  });

  document.addEventListener('click', (e) => {
    if(searchActive && !chip.contains(e.target)) closeSearch(true);
  });

  navbar.addEventListener('touchstart', (e) => {
    if(e.target === navbar) navbar.classList.contains('collapsed') ? expand() : collapse();
  }, {passive:true});
})();
</script>
</body>
